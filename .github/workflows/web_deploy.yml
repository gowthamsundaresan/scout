name: deploy web

# The Vercel GitHub app isn't installed, so main-merge promotion runs through the CLI instead.
on:
  push:
    branches: [main]
    paths: ['packages/web/**']
  workflow_dispatch:

jobs:
  vercel:
    runs-on: ubuntu-latest
    # A bad token makes the CLI wait forever on interactive login — fail loud instead
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The Vercel account has no linked GitHub identity, so deployments carrying commit
      # metadata are BLOCKED ("commit email could not be matched"). Strip .git so the CLI
      # sends none — the deploy is judged on the token alone.
      - name: Strip git metadata
        run: rm -rf .git

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # --archive=tgz: single-tarball upload; per-file uploads have stalled from this repo
        run: npx -y vercel deploy --prod --yes --archive=tgz --token "$VERCEL_TOKEN"
